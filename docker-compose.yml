services:
  converter:
    build:
      context: ./converter-service
    ports:
      - "8080:8080"
    environment:
      - PORT=8080

  frontend:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_CONVERTER_API_URL=http://converter:8080/convert
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - converter